<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yersu - Kutu Oyunu</title>
    <!-- Modern Fontlar -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="lobbyContainer">
        <h1>YERSU</h1>
        
        <div class="setup-section">
            <div class="input-group">
                <label for="mapSize">Harita Boyutu</label>
                <select id="mapSize" class="input-style">
                    <option value="orta">Orta (37 Hex)</option>
                    <option value="buyuk">Büyük (61 Hex)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="playerCount">Oyuncu Sayısı</label>
                <select id="playerCount" class="input-style">
                    <option value="2">2 Oyuncu</option>
                    <option value="3">3 Oyuncu</option>
                    <option value="4">4 Oyuncu</option>
                    <option value="5">5 Oyuncu</option>
                    <option value="6">6 Oyuncu</option>
                </select>
            </div>
        </div>

        <div class="setup-section">
            <h3 style="font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">Oyuncular</h3>
            <div id="playerList" class="player-list">
                <!-- JS tarafından doldurulacak -->
            </div>
        </div>

        <button id="startBtn" class="btn-primary">Oyunu Başlat</button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
